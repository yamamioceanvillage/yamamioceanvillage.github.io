<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>YAMAMI Ocean Village</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
font-family:-apple-system,BlinkMacSystemFont,sans-serif;
background:#f7fbfd;
color:#1b365d;
}

header{
position:fixed;
top:0;
left:0;
width:100%;
padding:18px 24px;
display:flex;
justify-content:space-between;
align-items:center;
background:rgba(255,255,255,.9);
backdrop-filter:blur(10px);
z-index:1000;
}

.logo{
font-size:20px;
font-weight:bold;
}

.hero{
height:100vh;
background:linear-gradient(180deg,#78d8ff,#0d6fb8);
display:flex;
justify-content:center;
align-items:center;
text-align:center;
color:white;
padding:20px;
}

.hero h1{
font-size:48px;
margin-bottom:20px;
}

.hero p{
font-size:22px;
line-height:1.7;
}

.btn{
display:inline-block;
margin-top:35px;
padding:15px 35px;
background:white;
color:#0d6fb8;
border-radius:50px;
text-decoration:none;
font-weight:bold;
}
</style>

</head>

<body>

<header>

<div class="logo">
YAMAMI
</div>

<div>
☰
</div>

</header>

<section class="hero">

<div>

<h1>Ocean Village</h1>

<p>

新しい日本のイナカを、<br>
ムラからつくりなおす。

</p>

<a href="#" class="btn">
施設を見る
</a>

</div>

</section>

</body>

</html>
