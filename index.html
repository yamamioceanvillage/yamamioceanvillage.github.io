<!DOCTYPE html>
<html lang="ja">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">

<title>YAMAMI Ocean Village</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;500;700&family=Caveat:wght@700&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

html{
scroll-behavior:smooth;
}

body{

font-family:'Noto Sans JP',sans-serif;
background:#f6fbff;
color:#163f70;

}

header{

position:fixed;
top:0;
left:0;
width:100%;
display:flex;
justify-content:space-between;
align-items:center;
padding:20px 30px;
background:rgba(255,255,255,.9);
backdrop-filter:blur(10px);
z-index:999;

}

.logo{

font-size:28px;
font-weight:bold;

}

nav{

display:flex;
gap:28px;

}

nav a{

text-decoration:none;
color:#163f70;
font-weight:600;

}

.hero{

height:100vh;

background:
linear-gradient(rgba(0,0,0,.25),rgba(0,0,0,.25)),
url("images/hero.jpg");

background-size:cover;
background-position:center;

display:flex;
align-items:center;

padding:0 8%;

}

.hero-text{

max-width:650px;

color:white;

}

.hero-text h2{

font-size:72px;

font-family:'Caveat',cursive;

margin-bottom:30px;

line-height:1.1;

}

.hero-text h1{

font-size:54px;

margin-bottom:25px;

}

.hero-text p{

font-size:22px;

line-height:1.8;

margin-bottom:40px;

}

.button{

display:inline-block;

padding:18px 38px;

background:white;

color:#1b4b82;

border-radius:50px;

text-decoration:none;

font-weight:bold;

transition:.3s;

}

.button:hover{

transform:translateY(-4px);

}
/* ---------- スマホ対応 ---------- */

@media (max-width:768px){

header{
    padding:15px 20px;
    flex-direction:column;
    gap:15px;
}

.logo{
    font-size:34px;
    text-align:center;
}

nav{
    display:grid;
    grid-template-columns:repeat(4,1fr);
    gap:12px;
    width:100%;
    text-align:center;
}

nav a{
    font-size:15px;
}

.hero{
    padding:140px 8% 80px;
    height:auto;
}

.hero-text h2{
    font-size:40px;
}

.hero-text h1{
    font-size:44px;
    line-height:1.2;
}

.hero-text p{
    font-size:18px;
}

.button{
    display:block;
    width:220px;
    text-align:center;
    margin:auto;
}

}
</style>

</head>

<body>

<header>

<div class="logo">
YAMAMI Ocean Village
</div>

<nav>

<a href="#">HOME</a>

<a href="#">施設案内</a>

<a href="#">料金</a>

<a href="#">キャンプ</a>

<a href="#">BBQ</a>

<a href="#">かき氷</a>

<a href="#">アクセス</a>

<a href="#">お問い合わせ</a>

</nav>

</header>

<section class="hero">

<div class="hero-text">

<h2>
New life,<br>
New village.
</h2>

<h1>

今日だけ遊びに来る場所じゃない。

</h1>

<p>

毎年帰って来たくなる村へ。<br>

海まで徒歩10秒。<br>

遊ぶ、食べる、くつろぐ。

</p>

<a href="#" class="button">

施設を見る

</a>

</div>

</section>
<section style="padding:80px 8%;background:white;">

<h2 style="font-size:40px;text-align:center;margin-bottom:50px;">
Facilities
</h2>

<div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(260px,1fr));gap:30px;">

<div style="background:#f5fbff;border-radius:20px;padding:30px;">
<h3>🏕 CAMP</h3>
<p>海辺で過ごす特別な時間。</p>
</div>

<div style="background:#f5fbff;border-radius:20px;padding:30px;">
<h3>🔥 BBQ</h3>
<p>手ぶらでも楽しめるBBQ。</p>
</div>

<div style="background:#f5fbff;border-radius:20px;padding:30px;">
<h3>🍧 SHAVED ICE</h3>
<p>夏限定のかき氷。</p>
</div>

<div style="background:#f5fbff;border-radius:20px;padding:30px;">
<h3>🚿 SHOWER</h3>
<p>温水シャワー完備。</p>
</div>

<div style="background:#f5fbff;border-radius:20px;padding:30px;">
<h3>🚗 PARKING</h3>
<p>広々駐車場。</p>
</div>

<div style="background:#f5fbff;border-radius:20px;padding:30px;">
<h3>👨‍👩‍👧 FAMILY</h3>
<p>家族みんなが楽しめる。</p>
</div>

</div>

</section>

</body>
</html>
